databases:
  - name: clipninja-db
    plan: free
    databaseName: clipninja
    user: clipninja

services:
  - type: redis
    name: clipninja-redis
    plan: free
    ipAllowList: []

  - type: web
    name: clipninja-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: OCR_ENABLED
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: clipninja-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clipninja-redis
          property: connectionString
      - key: REDIS_PUBSUB_URL
        fromService:
          type: redis
          name: clipninja-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: '["https://clipninja-frontend.onrender.com"]'

  - type: web
    name: clipninja-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://clipninja-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
